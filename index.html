<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsendy Play All</title>
    <style>
        /* CSS ya muonekano wa App */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            background-color: #2b78e4;
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
        }

        /* Sehemu ya Media Player */
        .player-section {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        #media-display {
            width: 100%;
            border-radius: 10px;
            background: #000;
            margin-bottom: 15px;
            display: none; /* Inatokea tu file likichaguliwa */
        }

        .custom-file-input {
            background: #2b78e4;
            color: white;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
        }

        .controls button {
            background: #2b78e4;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 18px;
            margin: 5px;
            cursor: pointer;
        }

        /* Sehemu ya Donation (Kama ilivyo kwenye picha yako) */
        .donation-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .donation-card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: normal;
        }

        .donation-card .number {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Vifungo vya Share na More Apps */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-whatsapp { background-color: #25D366; }
        .btn-bluetooth { background-color: #0082fc; }
        .btn-more { 
            background-color: #6c5ce7; 
            grid-column: span 2; 
        }

        footer {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">Wsendy Play All</div>

    <div class="container">
        
        <div class="player-section">
            <label class="custom-file-input" for="file-upload">Chagua Wimbo/Video (Offline)</label>
            <input type="file" id="file-upload" accept="audio/*,video/*" style="display:none">
            
            <video id="media-display" controls></video>
            <audio id="audio-player" style="display:none"></audio>

            <div class="controls">
                <p id="file-name">Hakuna faili lililochaguliwa</p>
            </div>
        </div>

        <div class="donation-card">
            <div style="font-size: 30px; margin-bottom: 5px;">❤️</div>
            <h3>Changia kuboresha mfumo huu:</h3>
            <div class="number">0627962633</div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-whatsapp" onclick="shareWhatsApp()">Share WhatsApp</button>
            <button class="btn btn-bluetooth" onclick="shareBluetooth()">Bluetooth Share</button>
            
            <a href="https://example.com/albert-kabonge" class="btn btn-more">
                More Apps (Albert Kabonge - Iringa)
            </a>
        </div>

        <footer>&copy; 2024 Wsendy Play All</footer>
    </div>

    <script>
        const fileUpload = document.getElementById('file-upload');
        const mediaDisplay = document.getElementById('media-display');
        const fileNameText = document.getElementById('file-name');

        // Kazi ya kupakia faili na kucheza (Offline)
        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                fileNameText.innerText = "Inacheza: " + file.name;
                
                mediaDisplay.style.display = "block";
                mediaDisplay.src = fileURL;
                mediaDisplay.play();
            }
        });

        // Kazi ya Kushare kwenye WhatsApp
        function shareWhatsApp() {
            const text = "Tumia App ya Wsendy Play All kucheza media offline! Changia mradi hapa: 0627962633";
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(text));
        }

        // Kazi ya Kushare (Bluetooth/System Share)
        async function shareBluetooth() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Wsendy Play All',
                        text: 'Angalia app hii nzuri ya kucheza audio na video offline.',
                        url: window.location.href
                    });
                } catch (err) {
                    alert("Sharing haijafanikiwa.");
                }
            } else {
                alert("Browser yako haisupport Direct Share. Tafadhali tumia Bluetooth ya simu.");
            }
        }
    </script>

</body>
</html>
